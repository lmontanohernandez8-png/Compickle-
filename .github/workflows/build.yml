name: Build wheels

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_wheels:
    name: ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-latest
            arch: aarch64
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64
          - os: windows-latest
            arch: AMD64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.0
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: "pp* *-win32 *-manylinux_i686"
          CIBW_BUILD_FRONTEND: pip
          CIBW_BEFORE_BUILD: python -m pip install -U pip setuptools wheel
          CIBW_ENVIRONMENT: >
            CFLAGS="-O3 -fomit-frame-pointer"
          CIBW_TEST_COMMAND: python -c "import compickle; assert compickle.dumps([1,2,3]) != b''"

      - name: Guardar wheels como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
